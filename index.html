<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DINO RUN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ HUD ░░ -->
  <div id="hud">
    <div id="hud-left">
      <button id="btn-music" title="Alternar música (M)">
        <span id="music-icon">🔊</span>
      </button>
      <div id="boost-wrap">
        <div id="boost-label">DASH <kbd>→</kbd></div>
        <div id="boost-track">
          <div id="boost-fill"></div>
        </div>
        <div id="boost-status">PRONTO</div>
      </div>
    </div>
    <div id="hud-right">
      <div id="score-box">
        <span class="hud-tag">SCORE</span>
        <span id="score">0</span>
      </div>
      <div id="hs-box">
        <span class="hud-tag">BEST</span>
        <span id="high-score">0</span>
      </div>
    </div>
  </div>

  <!-- ░░ CANVAS ░░ -->
  <canvas id="gameCanvas"></canvas>

  <!-- ░░ TELA DE GAME OVER ░░ -->
  <!-- O canvas desenha game_over.png e exit.png por cima do jogo.
       Este overlay exibe apenas o score numa barra transparente na base. -->
  <div id="overlay" class="hidden">
    <div id="overlay-inner">
      <div id="go-score-wrap">
        <span class="go-label">PONTUAÇÃO</span>
        <span id="go-score">0</span>
      </div>
      <div id="go-hs-wrap">
        <span class="go-label">RECORDE</span>
        <span id="go-hs">0</span>
      </div>
    </div>
  </div>
  <!-- botões ocultos mas mantidos para o JS funcionar -->
  <button id="btn-restart" style="display:none"></button>
  <button id="btn-quit"    style="display:none"></button>

  <!-- ░░ TELA DE INÍCIO ░░ -->
  <div id="start-screen">
    <div id="start-inner">
      <div id="start-title">
        <span class="st-d">D</span><span class="st-i">I</span><span class="st-n">N</span><span class="st-o">O</span>
        <span class="st-run">RUN</span>
      </div>
      <div id="start-dino">🦕</div>
      <div id="start-controls">
        <div class="ctrl-row"><kbd>ESPAÇO</kbd> Pular</div>
        <div class="ctrl-row"><kbd>↓</kbd> Cair rápido</div>
        <div class="ctrl-row"><kbd>→</kbd> Dash de velocidade</div>
        <div class="ctrl-row"><kbd>M</kbd> Música on/off</div>
      </div>
      <button id="btn-start">
        COMEÇAR <kbd>ESPAÇO</kbd>
      </button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
